<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  min-height: 100vh;
}

.header {
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.header h1 span {
  color: #5eead4;
}

.header-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  background: #1a1a2e;
  border: 1px solid #2a2a4e;
  color: #e0e0e0;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}

.btn:hover {
  background: #2a2a4e;
  border-color: #5eead4;
  color: #fff;
}

.btn-primary {
  background: #0d9488;
  border: 1px solid #0d9488;
  color: #fff;
}

.btn-primary:hover {
  background: #14b8a6;
}

.btn-danger {
  border-color: #7f1d1d;
  color: #fca5a5;
}

.btn-danger:hover {
  background: #7f1d1d;
  border-color: #dc2626;
  color: #fff;
}

.boards {
  display: flex;
  gap: 16px;
  padding: 0 24px 24px;
  max-width: 1200px;
  margin: 0 auto;
  overflow-x: auto;
  align-items: flex-start;
}

.column {
  flex: 1;
  min-width: 280px;
  max-width: 380px;
  background: #0f0f1a;
  border: 1px solid #1e293b;
  border-radius: 12px;
  padding: 16px;
}

.column-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid #1e293b;
}

.column-header h2 {
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.column-header .count {
  background: #1e293b;
  color: #94a3b8;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}

.column.todo .column-header h2 { color: #94a3b8; }
.column.in-progress .column-header h2 { color: #fbbf24; }
.column.done .column-header h2 { color: #5eead4; }

.tasks {
  min-height: 60px;
}

.task {
  background: #1a1a2e;
  border: 1px solid #2a2a4e;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: grab;
  transition: all 0.15s;
  position: relative;
  user-select: none;
}

.task:hover {
  border-color: #5eead4;
  background: #1e1e35;
}

.task:active {
  cursor: grabbing;
}

.task.dragging {
  opacity: 0.5;
  transform: rotate(1deg);
}

.task .task-text {
  font-size: 14px;
  color: #e0e0e0;
  line-height: 1.4;
  word-break: break-word;
  padding-right: 24px;
}

.task .task-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 20px;
  height: 20px;
  border: none;
  background: none;
  color: #475569;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.2s;
}

.task:hover .task-delete {
  opacity: 1;
  color: #94a3b8;
}

.task .task-delete:hover {
  color: #fca5a5;
  background: #7f1d1d33;
}

.task .task-date {
  font-size: 11px;
  color: #475569;
  margin-top: 4px;
}

.drag-over {
  border-color: #5eead4;
  background: #1a2e2a;
}

.add-task-area {
  margin-top: 12px;
}

.add-task-area textarea {
  width: 100%;
  background: #0a0a1a;
  border: 1px solid #2a2a4e;
  border-radius: 8px;
  padding: 10px 12px;
  color: #e0e0e0;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 60px;
  outline: none;
  transition: border-color 0.2s;
}

.add-task-area textarea:focus {
  border-color: #5eead4;
}

.add-task-area textarea::placeholder {
  color: #475569;
}

.add-task-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

.empty-state {
  color: #475569;
  font-size: 13px;
  text-align: center;
  padding: 20px 0;
  font-style: italic;
}

.mobile-warning {
  display: none;
  background: #7f1d1d33;
  border: 1px solid #7f1d1d;
  color: #fca5a5;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 12px;
  text-align: center;
}

@media (max-width: 768px) {
  .boards {
    flex-direction: column;
    align-items: stretch;
  }
  .column {
    max-width: none;
    min-width: 0;
  }
  .mobile-warning {
    display: block;
  }
}
</style>
</head>
<body>

<div class="header">
  <h1>📋 <span>Kanban</span></h1>
  <div class="header-actions">
    <button class="btn" onclick="exportData()">📥 Export</button>
    <button class="btn" onclick="document.getElementById('importInput').click()">📤 Import</button>
    <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear</button>
  </div>
</div>

<div class="boards" id="boards">
  <div class="column todo" data-column="todo">
    <div class="column-header">
      <h2>📌 To Do</h2>
      <span class="count" id="todo-count">0</span>
    </div>
    <div class="tasks" id="todo-tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div class="add-task-area">
      <textarea id="todo-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTask('todo')}"></textarea>
      <div class="add-task-actions">
        <button class="btn btn-primary" onclick="addTask('todo')">+ Add</button>
      </div>
    </div>
  </div>

  <div class="column in-progress" data-column="in-progress">
    <div class="column-header">
      <h2>⚡ In Progress</h2>
      <span class="count" id="progress-count">0</span>
    </div>
    <div class="tasks" id="progress-tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div class="add-task-area">
      <textarea id="progress-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTask('in-progress')}"></textarea>
      <div class="add-task-actions">
        <button class="btn btn-primary" onclick="addTask('in-progress')">+ Add</button>
      </div>
    </div>
  </div>

  <div class="column done" data-column="done">
    <div class="column-header">
      <h2>✅ Done</h2>
      <span class="count" id="done-count">0</span>
    </div>
    <div class="tasks" id="done-tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div class="add-task-area">
      <textarea id="done-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTask('done')}"></textarea>
      <div class="add-task-actions">
        <button class="btn btn-primary" onclick="addTask('done')">+ Add</button>
      </div>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'kanban-tasks';

let tasks = {
  todo: [],
  'in-progress': [],
  done: []
};

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      tasks = JSON.parse(saved);
    }
  } catch(e) {}
  render();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  render();
}

function render() {
  for (const col of ['todo', 'in-progress', 'done']) {
    const container = document.getElementById(`${col === 'in-progress' ? 'progress' : col}-tasks`);
    const countEl = document.getElementById(`${col === 'in-progress' ? 'progress' : col}-count`);

    if (!container) continue;
    container.innerHTML = '';

    const items = tasks[col] || [];

    if (items.length === 0) {
      container.innerHTML = `<div class="empty-state">No tasks</div>`;
      if (countEl) countEl.textContent = '0';
      continue;
    }

    if (countEl) countEl.textContent = items.length;

    items.forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'task';
      div.draggable = true;
      div.dataset.index = idx;
      div.dataset.column = col;

      div.innerHTML = `
        <div class="task-text">${escapeHtml(item.text)}</div>
        <button class="task-delete" onclick="deleteTask('${col}', ${idx})" title="Delete">×</button>
        <div class="task-date">${item.date || ''}</div>
      `;

      div.addEventListener('dragstart', dragStart);
      div.addEventListener('dragend', dragEnd);

      container.appendChild(div);
    });
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function addTask(column) {
  const input = document.getElementById(`${column === 'in-progress' ? 'progress' : column}-input`);
  const text = input.value.trim();
  if (!text) return;

  tasks[column].push({
    text: text,
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
  });

  input.value = '';
  save();
}

function deleteTask(column, index) {
  tasks[column].splice(index, 1);
  save();
}

function clearAll() {
  if (!confirm('Delete all tasks?')) return;
  tasks = { todo: [], 'in-progress': [], done: [] };
  save();
}

// Drag and drop
let draggedItem = null;

function dragStart(e) {
  draggedItem = {
    column: e.target.dataset.column,
    index: parseInt(e.target.dataset.index)
  };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function allowDrop(e) {
  e.preventDefault();
  const tasksEl = e.currentTarget;
  tasksEl.classList.add('drag-over');
}

function drop(e) {
  e.preventDefault();
  const tasksEl = e.currentTarget;
  tasksEl.classList.remove('drag-over');

  if (!draggedItem) return;

  const targetColumn = tasksEl.id.replace('-tasks', '');
  const colMap = { 'todo': 'todo', 'progress': 'in-progress', 'done': 'done' };
  const toColumn = colMap[targetColumn] || targetColumn;

  if (!toColumn) return;

  const task = tasks[draggedItem.column][draggedItem.index];
  if (!task) return;

  tasks[draggedItem.column].splice(draggedItem.index, 1);
  tasks[toColumn].push(task);

  draggedItem = null;
  save();
}

function exportData() {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kanban-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.todo && data['in-progress'] && data.done) {
        tasks = data;
        save();
        alert('Imported successfully!');
      } else {
        alert('Invalid format - expected todo, in-progress, done columns');
      }
    } catch(err) {
      alert('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

load();
</script>
</body>
</html>
