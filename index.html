<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kanban — Bird's Eye</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #5645d4;
  --primary-pressed: #4534b3;
  --link-blue: #0075de;
  --brand-pink: #ff64c8;
  --brand-orange: #dd5b00;
  --brand-purple: #7b3ff2;
  --brand-teal: #2a9d99;
  --brand-green: #1aae39;
  --brand-yellow: #f5d75e;
  --tint-peach: #ffe8d4;
  --tint-rose: #fde0ec;
  --tint-mint: #d9f3e1;
  --tint-lavender: #e6e0f5;
  --tint-sky: #dcecfa;
  --tint-yellow: #fef7d6;
  --tint-yellow-bold: #f9e79f;
  --canvas: #ffffff;
  --surface: #f6f5f4;
  --surface-soft: #fafaf9;
  --hairline: #e5e3df;
  --hairline-soft: #ede9e4;
  --hairline-strong: #c8c4be;
  --ink: #1a1a1a;
  --charcoal: #37352f;
  --slate: #5d5b54;
  --steel: #787671;
  --stone: #a4a097;
  --muted: #bbb8b1;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: "Inter", -apple-system, "Segoe UI", Helvetica, sans-serif;
  background: var(--surface-soft);
  color: var(--charcoal);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

.topbar {
  background: var(--canvas);
  border-bottom: 1px solid var(--hairline);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 20;
}

.topbar .brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 16px;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.topbar .brand .glyph {
  width: 22px; height: 22px;
  background: var(--ink);
  color: white;
  border-radius: 5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  font-family: ui-serif, Georgia, serif;
}

.topbar .crumbs {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--slate);
  margin-left: 8px;
}

.topbar .crumbs strong {
  color: var(--ink);
  font-weight: 600;
}

.topbar .tabs {
  display: flex;
  margin-left: 16px;
  gap: 0;
}

.topbar .tab {
  padding: 6px 10px;
  font-size: 13px;
  color: var(--slate);
  font-weight: 500;
  border-bottom: 2px solid transparent;
  cursor: default;
}

.topbar .tab.active {
  color: var(--ink);
  border-bottom-color: var(--ink);
}

.topbar .right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 8px;
  font: 500 13px/1.3 "Inter", system-ui;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--charcoal);
  transition: background .15s;
  white-space: nowrap;
}

.btn:hover { background: var(--surface); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-pressed); }
.btn-danger { color: var(--steel); }
.btn-danger:hover { background: var(--tint-rose); color: #c0392b; }

/* --- Page structure --- */
.page {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}

.page-header {
  margin-bottom: 24px;
}

.page-header h1 {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--ink);
  margin: 0 0 4px;
}

.page-header p {
  font-size: 14px;
  color: var(--slate);
  margin: 0;
}

/* --- Kanban board --- */
.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  align-items: start;
}

@media (max-width: 1100px) { .board { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .board { grid-template-columns: 1fr; } }

.column {
  background: transparent;
}

.col-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--charcoal);
}

.col-head .status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.col-head .status-dot.todo { background: var(--stone); }
.col-head .status-dot.progress { background: var(--brand-yellow); }
.col-head .status-dot.review { background: var(--brand-orange); }
.col-head .status-dot.done { background: var(--brand-green); }

.col-head .badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  color: var(--charcoal);
}

.col-head .badge.todo { background: var(--tint-yellow-bold); color: #6d4c00; }
.col-head .badge.progress { background: var(--tint-sky); color: #00497a; }
.col-head .badge.review { background: var(--tint-rose); color: var(--steel); }
.col-head .badge.done { background: var(--tint-mint); color: #117026; }

.col-head .count {
  margin-left: auto;
  color: var(--steel);
  font-weight: 400;
  font-size: 12px;
}

.tasks {
  min-height: 80px;
}

/* --- Task card --- */
.task {
  background: var(--canvas);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 6px;
  cursor: grab;
  transition: box-shadow .15s, border-color .15s;
  position: relative;
  user-select: none;
}

.task:hover {
  border-color: var(--primary);
  box-shadow: rgba(86,69,212,0.08) 0 2px 8px;
}

.task:active { cursor: grabbing; }
.task.dragging { opacity: 0.5; }

.task .project-tag {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.task .project-tag.tag-aimn { color: var(--primary); }
.task .project-tag.tag-fuel { color: var(--brand-teal); }
.task .project-tag.tag-github { color: var(--brand-orange); }
.task .project-tag.tag-system { color: var(--steel); }

.task .task-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--charcoal);
  line-height: 1.4;
  word-break: break-word;
  padding-right: 20px;
}

.task .task-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--steel);
}

.task .task-meta .label {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 500;
}

.task .task-meta .label.pri-high { background: var(--tint-rose); color: #c0392b; }
.task .task-meta .label.pri-med { background: var(--tint-yellow); color: #6d4c00; }
.task .task-meta .label.pri-low { background: var(--tint-mint); color: #117026; }

.task .task-delete {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 20px;
  height: 20px;
  border: none;
  background: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  border-radius: 4px;
  opacity: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity .15s, background .15s, color .15s;
}

.task:hover .task-delete { opacity: 1; }
.task .task-delete:hover { background: var(--tint-rose); color: #c0392b; }

.drag-over { border-color: var(--primary) !important; background: var(--tint-lavender) !important; }
.empty-state { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }

/* --- Add task --- */
.add-area { margin-top: 8px; }

.add-area textarea {
  width: 100%;
  background: var(--surface-soft);
  border: 1px solid var(--hairline);
  border-radius: 8px;
  padding: 8px 10px;
  color: var(--charcoal);
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
  min-height: 40px;
  outline: none;
  transition: border-color .15s;
}

.add-area textarea:focus {
  border-color: var(--primary);
  background: var(--canvas);
}

.add-area .add-actions {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

/* --- Section --- */
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--steel);
  margin: 24px 0 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--hairline-soft);
}

/* --- Export/Import --- */
.hidden-input { display: none; }

/* Responsive */
@media (max-width: 768px) {
  .page { padding: 12px; }
  .topbar { padding: 10px 12px; }
  .topbar .tabs { display: none; }
}
</style>
</head>
<body>

<div id="lockOverlay" style="position:fixed;inset:0;z-index:9999;background:var(--surface-soft);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="font-size:32px;font-weight:600;color:var(--ink);letter-spacing:-0.5px;">✦ Kanban</div>
  <div style="color:var(--slate);font-size:14px;">Password required</div>
  <input id="pwInput" type="password" style="padding:8px 14px;border-radius:8px;border:1px solid var(--hairline-strong);font-size:16px;font-family:inherit;width:240px;text-align:center;outline:none;background:var(--canvas);color:var(--charcoal);" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()">
  <button onclick="checkPw()" style="padding:8px 24px;border-radius:8px;border:none;background:var(--primary);color:white;font:500 14px Inter;cursor:pointer;">Unlock</button>
  <div id="pwError" style="color:#c0392b;font-size:13px;display:none;">Wrong password</div>
</div>

<script>
function checkPw() {
  const pw = document.getElementById('pwInput').value;
  if (pw === 'entirelyinhouse') {
    document.getElementById('lockOverlay').style.display = 'none';
    sessionStorage.setItem('kanban_unlocked', '1');
  } else {
    document.getElementById('pwError').style.display = 'block';
    setTimeout(() => document.getElementById('pwError').style.display = 'none', 2000);
  }
}
if (sessionStorage.getItem('kanban_unlocked')) {
  document.getElementById('lockOverlay').style.display = 'none';
}
</script>

<div class="topbar">

<div class="page">

    <h1>Projects & Actions</h1>
    <p>Bird's-eye view of everything in flight</p>
  </div>

  <div class="board" id="board">
    <!-- To Do -->
    <div class="column" data-col="todo">

    <!-- In Progress -->

      <div class="col-head">
        <span class="status-dot progress"></span>

      </div>
      <div class="tasks" id="progress-tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

        <textarea id="progress-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTask('in-progress')}"></textarea>
        <div class="add-actions">
          <button class="btn btn-primary" onclick="addTask('in-progress')">Add</button>
        </div>
      </div>
    </div>

    <!-- In Review -->
    <div class="column" data-col="review">
      <div class="col-head">
        <span class="status-dot review"></span>
        <span class="badge review">Review</span>
        <span class="count" id="review-count">0</span>
      </div>
      <div class="tasks" id="review-tasks" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
      <div class="add-area">
        <textarea id="review-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTask('review')}"></textarea>
        <div class="add-actions">
          <button class="btn btn-primary" onclick="addTask('review')">Add</button>
        </div>
      </div>
    </div>

    <!-- Done -->
    <div class="column" data-col="done">
      <div class="col-head">
        <span class="status-dot done"></span>

          <button class="btn btn-primary" onclick="addTask('done')">Add</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const KEY = 'kanban-birdseye';

let data = {
  todo: [],
  'in-progress': [],
  review: [],
  done: [
    { text: 'Dream Journal — password-protected, Superlist design', project: 'System', priority: 'med', date: 'Jun 5' }
  ]
};

function load() {
  try {
    const saved = localStorage.getItem(KEY);
    if (saved) data = JSON.parse(saved);
  } catch(e) {}
  render();
}

function save() {
  localStorage.setItem(KEY, JSON.stringify(data));
  render();
}

const colMap = { 'todo': 'todo', 'progress': 'in-progress', 'review': 'review', 'done': 'done' };
const revColMap = { 'todo': 'todo', 'in-progress': 'progress', 'review': 'review', 'done': 'done' };

function colId(col) {
  const m = { 'todo': 'todo', 'in-progress': 'progress', 'review': 'review', 'done': 'done' };
  return m[col] || col;
}

function render() {
  for (const col of ['todo', 'in-progress', 'review', 'done']) {
    const id = colId(col);
    const container = document.getElementById(id + '-tasks');
    const countEl = document.getElementById(id + '-count');
    if (!container) continue;

    const items = data[col] || [];
    container.innerHTML = '';

    if (countEl) countEl.textContent = items.length;

    if (items.length === 0) {
      container.innerHTML = '<div class="empty-state">No tasks</div>';
      continue;
    }

    items.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'task';
      card.draggable = true;
      card.dataset.idx = idx;
      card.dataset.col = col;

      let tagClass = '';
      const p = (item.project || '').toLowerCase();
      if (p.includes('aimn') || p.includes('podcast') || p.includes('scalesystems')) tagClass = 'tag-aimn';
      else if (p.includes('fuel') || p.includes('meal') || p.includes('pe')) tagClass = 'tag-fuel';
      else if (p.includes('github') || p.includes('pages')) tagClass = 'tag-github';
      else tagClass = 'tag-system';

      let priClass = '';
      if (item.priority === 'high') priClass = 'pri-high';
      else if (item.priority === 'med') priClass = 'pri-med';
      else priClass = 'pri-low';

      let html = '';
      if (item.project) {
        html += `<div class="project-tag ${tagClass}">${esc(item.project)}</div>`;
      }
      html += `<div class="task-title">${esc(item.text)}</div>`;
      html += `<div class="task-meta">`;
      if (item.priority) {
        html += `<span class="label ${priClass}">${item.priority}</span>`;
      }
      if (item.date) {
        html += `<span>${item.date}</span>`;
      }
      html += `</div>`;
      html += `<button class="task-delete" onclick="del('${col}',${idx})" title="Delete">✕</button>`;

      card.innerHTML = html;
      card.addEventListener('dragstart', dragStart);
      card.addEventListener('dragend', dragEnd);

      container.appendChild(card);
    });
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function addTask(col) {
  const id = colId(col);
  const input = document.getElementById(id + '-input');
  const text = (input.value || '').trim();
  if (!text) return;

  data[col].push({
    text: text,
    project: '',
    priority: 'med',
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
  });
  input.value = '';
  save();
}

function del(col, idx) {
  data[col].splice(idx, 1);
  save();
}

function clearAll() {
  if (!confirm('Delete all tasks?')) return;
  data = { todo: [], 'in-progress': [], review: [], done: [] };
  save();
}

/* Drag & Drop */
let dragItem = null;

function dragStart(e) {
  dragItem = { col: e.target.dataset.col, idx: parseInt(e.target.dataset.idx) };
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function dragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function allowDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function drop(e) {
  e.preventDefault();
  const el = e.currentTarget;
  el.classList.remove('drag-over');
  if (!dragItem) return;

  const target = el.id.replace('-tasks', '');
  const toCol = colMap[target] || target;

  const task = data[dragItem.col][dragItem.idx];
  if (!task) return;

  data[dragItem.col].splice(dragItem.idx, 1);
  data[toCol].push(task);
  dragItem = null;
  save();
}

/* Export / Import */
function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kanban-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.todo && d['in-progress'] && d.review !== undefined && d.done) {
        data = d;
        save();
      } else {
        alert('Invalid format');
      }
    } catch(err) { alert('Invalid JSON'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
